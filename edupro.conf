# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

server {
    server_name educore.silver-screen.stream;

    root /var/www/html/edupro/frontend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript application/x-font-ttf font/opentype image/svg+xml;

    # Frontend - Vue.js SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - Laravel via PHP-FPM
    location ^~ /api {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        alias /var/www/html/edupro/backend/public;
        try_files $uri $uri/ @laravel_api;
    }

    location @laravel_api {
        rewrite ^/api/(.*)$ /backend/public/index.php?/$1 last;
    }

    # PHP-FPM handler for Laravel API
    location ~ \.php$ {
        root /var/www/html/edupro;

        # Try socket first, fallback to TCP
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        # If socket doesn't work, use: fastcgi_pass 127.0.0.1:9000;
        
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $realpath_root$fastcgi_path_info;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_hide_header X-Robots-Tag;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Laravel storage (user uploads)
    location /storage {
        alias /var/www/html/edupro/backend/storage/app/public;

        try_files $uri $uri/ =404;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\.env$ {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~* ^/(composer\.(json|lock)|package\.json|phpunit\.xml)$ {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/edupro_access.log;
    error_log /var/log/nginx/edupro_error.log;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/educore.silver-screen.stream/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/educore.silver-screen.stream/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name educore.silver-screen.stream;
    return 301 https://$host$request_uri;
}
